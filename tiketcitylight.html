<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tiket Citylight</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glow { box-shadow: 0 0 20px #f472b6; }
</style>

</head>

<body class="opacity-0 scale-95 bg-gradient-to-b from-pink-100 to-pink-200 min-h-screen flex items-center justify-center p-4 transition-all duration-500">

  <div class="bg-white/80 backdrop-blur-lg p-5 rounded-3xl shadow-xl max-w-md w-full text-center">

    <!-- TITLE -->
    <h1 class="text-2xl font-bold text-pink-500 glow">🌆 Tiket Citylight</h1>

    <p class="text-gray-600 mt-2 text-sm">
      Malam romantis menanti 💖✨
    </p>

    <!-- GAMBAR TIKET -->
    <div class="mt-4">
      <img src="tiketcitylight.jpeg" class="rounded-2xl shadow-lg w-full">
    </div>

    <!-- INFO -->
    <div class="mt-4 text-left text-sm text-gray-600">
      <p><span class="font-semibold text-pink-500">📍 Lokasi:</span> Ratu Plaza Jakarta</p>
      <p><span class="font-semibold text-pink-500">👤 Nama:</span> Vivi 💖</p>
      <p><span class="font-semibold text-pink-500">🕒 Waktu:</span> 18.00 - 20.00</p>
      <p><span class="font-semibold text-pink-500">🎫 Tiket:</span> Special Night View</p>
    </div>

    <!-- BUTTON KEMBALI -->
    <a href="Rundown.html"
       class="block mt-6 bg-gray-200 text-gray-700 py-2 rounded-xl font-semibold hover:bg-gray-300 transition">
      ← Kembali ke Rundown
    </a>

  </div>

<script>
// animasi masuk
window.addEventListener("load", ()=>{
  document.body.classList.remove("opacity-0","scale-95");
});
</script>

</body>
</html>
