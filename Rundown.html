<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rundown ⏰</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fall {
  to { transform: translateY(100vh); opacity:0;}
}
</style>

</head>


<body class="opacity-0 scale-95 bg-gradient-to-b from-pink-100 to-pink-200 min-h-screen transition-all duration-500">

<div id="splash" class="fixed inset-0 bg-pink-200 flex flex-col items-center justify-center z-[9999]">
  <h1 class="text-3xl text-pink-600 font-bold animate-pulse">
    💖 Loading Sayang...
  </h1>
  <p class="text-sm text-gray-600 mt-2">Tunggu bentar ya 😭💕</p>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- CARD -->
<div class="bg-white/70 backdrop-blur-lg p-6 rounded-3xl shadow-xl w-full max-w-md">

  <h1 class="text-pink-500 text-2xl font-bold text-center">⏰ Rundown</h1>

  <div class="mt-6 space-y-6">

    <!-- BXSEA -->
    <div class="bg-white p-4 rounded-2xl shadow hover:scale-[1.03] hover:shadow-pink-300 transition">
      <img src="sutt/Bx.jpg" class="w-full h-32 object-cover rounded-xl mb-3">

      <p class="font-semibold text-gray-700">08.00 - 15.00</p>

      <a href="https://maps.google.com/?q=BXSea Bintaro"
        target="_blank"
        class="text-pink-500 font-semibold flex items-center gap-1 mt-1">
        📍 BXSea Bintaro
      </a>

      <p class="text-sm text-gray-500"> Explore 🐠💖</p>
    </div>

    <!-- BLOK M -->
    <div class="bg-white p-4 rounded-2xl shadow hover:scale-[1.03] hover:shadow-pink-300 transition">
      <img src="sutt/blokm.jpg" class="w-full h-32 object-cover rounded-xl mb-3">

      <p class="font-semibold text-gray-700">15.00 - 18.00</p>

      <a href="https://maps.google.com/?q=Blok M Jakarta"
        target="_blank"
        class="text-pink-500 font-semibold flex items-center gap-1 mt-1">
        📍 Blok M
      </a>

      <p class="text-sm text-gray-500">Jalan Santai & Makan 🛍️✨</p>
    </div>

    <!-- CITYLIGHT -->
    <div class="bg-white p-4 rounded-2xl shadow hover:scale-[1.03] hover:shadow-pink-300 transition">
      <img src="sutt/citylight.jpg" class="w-full h-32 object-cover rounded-xl mb-3">

      <p class="font-semibold text-gray-700">18.00 - 20.00</p>

      <a href="https://maps.google.com/?q=Ratu Plaza Jakarta"
        target="_blank"
        class="text-pink-500 font-semibold flex items-center gap-1 mt-1">
        📍 Jakarta Skyline Ratu Plaza
      </a>

      <p class="text-sm text-gray-500">Menikmati malam 🌆💖</p>
    </div>

    <!-- LAST -->
    <div class="bg-white p-4 rounded-2xl shadow hover:scale-[1.03] hover:shadow-pink-300 transition">
      <p class="font-semibold text-gray-700">21.00 - Selesai</p>
      <p class="text-pink-500 font-semibold mt-1">💖 Quality Time 💖</p>
    </div>

  </div>

  <!-- BACK -->
  <div class="flex gap-3 mt-6">
  
  <a href="Home.html"
    class="w-1/2 text-center text-pink-500 font-semibold border border-pink-500 py-2 rounded-xl hover:bg-pink-100 transition">
    ← Kembali
  </a>

  <button id="btnSelesai"
    class="w-1/2 bg-pink-500 text-white py-2 rounded-xl font-semibold shadow hover:scale-105 transition">
    💖 Selesai
  </button>

</div>

</div>



<script src="Script.js"></script>
<script src="App.js"></script>

<script>
// ==========================
// 📱 APP TRANSITION SYSTEM
// ==========================

// ANIMASI MASUK
window.addEventListener("load", ()=>{
  document.body.classList.remove("opacity-0","scale-95");
});

// ANIMASI PINDAH HALAMAN
document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click", function(e){
    e.preventDefault();

    document.body.classList.add("opacity-0","scale-95");

    setTimeout(()=>{
      window.location = this.href;
    },300);
  });
});


// ==========================
// 🎵 MUSIC PERSIST (ANTI RESTART)
// ==========================
const music = document.getElementById("music");

if(music){
  // ambil waktu terakhir
  const savedTime = localStorage.getItem("musicTime");

  if(savedTime){
    music.currentTime = savedTime;
  }

  // simpan posisi tiap detik
  setInterval(()=>{
    localStorage.setItem("musicTime", music.currentTime);
  },1000);
}
</script>

<script>
// ==========================
// 💖 POPUP SELESAI
// ==========================
const btnSelesai = document.getElementById("btnSelesai");

if(btnSelesai){
  btnSelesai.addEventListener("click", ()=>{

    // popup
    alert("💖 Selamat menikmati perjalanannya 💖\nSemoga harimu penuh kebahagiaan 🥰✨");

    // confetti kecil biar aesthetic 😆
    for(let i=0;i<40;i++){
      const c=document.createElement("div");
      c.style.position="fixed";
      c.style.width="6px";
      c.style.height="6px";
      c.style.background=["#ff69b4","#ffc0cb","#ff1493","#ffffff"][Math.floor(Math.random()*4)];
      c.style.left=Math.random()*100+"vw";
      c.style.top="0";
      c.style.animation="fall 3s linear";
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3000);
    }

  });
}
</script>

</body>
</html>
