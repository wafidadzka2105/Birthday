<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fall {
  to { transform: translateY(100vh); opacity:0;}
}

/* GLOW */
@keyframes glow {
  0% { box-shadow: 0 0 10px #f9a8d4; }
  50% { box-shadow: 0 0 25px #f472b6; }
  100% { box-shadow: 0 0 10px #f9a8d4; }
}
.glow {
  animation: glow 2s infinite;
}

/* SAFE AREA */
@supports(padding: max(0px)) {
  body {
    padding-bottom: max(7rem, env(safe-area-inset-bottom));
  }
}
</style>

</head>

<body class="opacity-0 scale-95 bg-gradient-to-b from-pink-100 to-pink-200 min-h-screen transition-all duration-500 pb-28">

<!-- SPLASH -->
<div id="splash" class="fixed inset-0 bg-pink-200 flex flex-col items-center justify-center z-[9999]">
  <h1 class="text-3xl text-pink-600 font-bold animate-pulse">
    💖 Loading Cantikk...
  </h1>
  <p class="text-sm text-gray-600 mt-2">Tunggu bentar ya 😭💕</p>
</div>

<audio id="music" loop>

</audio>

<!-- NAVBAR -->
<div id="navbar" class="fixed bottom-4 left-4 right-4 bg-white/70 backdrop-blur-xl flex justify-around py-3 text-xl rounded-2xl shadow-xl transition-all duration-300 border border-pink-200">

  <a href="Home.html">🏠</a>

  <a href="Undangan.html">💌</a>
  <a href="Dresscode.html">👗</a>
  <a href="Rundown.html">⏰</a>

</div>

<!-- HERO -->
<div class="text-center p-6">
  <h1 class="text-3xl font-bold text-pink-600">🎉 Happy Birthday 🎉</h1>
  <h2 class="mt-2">Vivi Meliani Arifin 💕</h2>

  <div class="flex justify-center mt-5">
    <div class="p-[3px] rounded-full bg-gradient-to-r from-pink-300 to-pink-500 glow">
      <img src="sutt/poto8.jpeg"
        class="w-28 h-28 md:w-32 md:h-32 rounded-full object-cover bg-white p-1">
    </div>
  </div>

  <p id="typing" class="mt-4 text-gray-600"></p>
</div>

<!-- CAKE -->
<div class="text-center text-6xl cursor-pointer" id="cake">🎂🔥</div>
<p class="text-center text-sm text-gray-500">Klik lilin untuk meniup 🎂</p>

<!-- SLIDER -->
<div class="mt-8 px-4">

<div id="progress" class="flex gap-1 mb-3"></div>

<!-- GALERI -->
<div class="mt-8 px-4 mb-10">

  <h2 class="text-center text-pink-500 font-bold">📸 Kenangan Kita</h2>

  <div class="overflow-hidden mt-4">
    <div id="slider" class="flex transition duration-700">

      <div class="min-w-full flex justify-center px-2">
        <div class="p-[4px] rounded-2xl bg-gradient-to-r from-pink-300 to-pink-500 glow w-full max-w-md">
          <img src="sutt/Poto1.jpeg"
            class="w-full aspect-video object-cover rounded-xl bg-white p-1">
        </div>
      </div>

      <div class="min-w-full flex justify-center px-2">
        <div class="p-[4px] rounded-2xl bg-gradient-to-r from-pink-300 to-pink-500 glow w-full max-w-md">
          <video src="sutt/vid2.mp4"
            class="w-full aspect-video object-cover rounded-xl bg-black p-1"
            autoplay muted loop playsinline>
          </video>
        </div>
      </div>

      <div class="min-w-full flex justify-center px-2">
        <div class="p-[4px] rounded-2xl bg-gradient-to-r from-pink-300 to-pink-500 glow w-full max-w-md">
          <img src="sutt/poto10.jpeg"
            class="w-full aspect-video object-cover rounded-xl bg-white p-1">
        </div>
      </div>
</div>

<script src="Script.js"></script>
<script src="App.js"></script>

<script>
// typing effect
const text="Selamat ulang tahun Vivi 💖 Semoga kamu selalu bahagia 🥰 Aku selalu sayang kamu 😭💕";
let i=0;

function t(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i++];
    setTimeout(t,40);
  }
}
t();


// 🎂 CAKE FIX
const cake = document.getElementById("cake");

cake.addEventListener("click", ()=>{
  cake.innerHTML="🎂";
  
  // confetti
  for(let i=0;i<50;i++){
    const c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="6px";
    c.style.height="6px";
    c.style.background=["pink","white","deeppink"][Math.floor(Math.random()*3)];
    c.style.left=Math.random()*100+"vw";
    c.style.top="0";
    c.style.animation="fall 3s linear";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }

  alert("Make a wish ya 💖😭");
});
</script>

<script>
// ==========================
// 📱 APP TRANSITION SYSTEM
// ==========================

// ANIMASI MASUK
window.addEventListener("load", ()=>{
  document.body.classList.remove("opacity-0","scale-95");
});

// ANIMASI PINDAH HALAMAN
document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click", function(e){
    e.preventDefault();

    document.body.classList.add("opacity-0","scale-95");

    setTimeout(()=>{
      window.location = this.href;
    },300);
  });
});


// ==========================
// 🎵 MUSIC PERSIST (ANTI RESTART)
// ==========================
const music = document.getElementById("music");

if(music){
  // ambil waktu terakhir
  const savedTime = localStorage.getItem("musicTime");

  if(savedTime){
    music.currentTime = savedTime;
  }

  // simpan posisi tiap detik
  setInterval(()=>{
    localStorage.setItem("musicTime", music.currentTime);
  },1000);
}
</script>

<script>
let lastScroll = 0;
const navbar = document.getElementById("navbar");

window.addEventListener("scroll", () => {
  let currentScroll = window.scrollY;

  if(currentScroll > lastScroll){
    // scroll ke bawah → sembunyikan
    navbar.style.transform = "translateY(100%)";
  } else {
    // scroll ke atas → munculin
    navbar.style.transform = "translateY(0)";
  }

  lastScroll = currentScroll;
});
</script>

</body>
</html>
