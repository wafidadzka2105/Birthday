<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Penutupan 💖</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fall {
  to { transform: translateY(100vh); opacity:0;}
}

.glow {
  box-shadow: 0 0 20px #f472b6;
}
</style>

</head>

<body class="opacity-0 scale-95 bg-gradient-to-b from-pink-100 to-pink-200 min-h-screen flex items-center justify-center p-4 transition-all duration-500 overflow-hidden">

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- CARD -->
<div class="bg-white/80 backdrop-blur-xl p-6 rounded-3xl shadow-xl max-w-md w-full text-center">

  <!-- TITLE -->
  <h1 class="text-2xl font-bold text-pink-500 glow">💖 The End 💖</h1>

  <!-- FOTO -->
  <div class="mt-4 flex justify-center">
    <div class="w-40 p-[3px] rounded-full bg-gradient-to-r from-pink-300 to-pink-500 glow">
      <img src="sutt/poto8.jpeg" class="w-full h-40 object-cover rounded-full bg-white p-1">
    </div>
  </div>

  <!-- PESAN -->
  <p class="mt-5 text-gray-600 leading-relaxed text-sm">
    Terima kasih sudah sampai di sini 💖<br><br>
    Semoga hari ini jadi salah satu hari terbaik dalam hidup kamu 🥺✨<br><br>
    Aku harap semua yang kamu lihat tadi bisa bikin kamu senyum…  
    bahkan kalau cuma sedikit 😭💕<br><br>
    Sekali lagi…  
    <span class="text-pink-500 font-semibold">
      Selamat ulang tahun ya, Vivi 💖
    </span>
  </p>

  <!-- BUTTON -->
  <a href="Home.html"
     class="block mt-6 bg-pink-500 text-white py-2 rounded-xl font-semibold hover:bg-pink-600 transition">
    🔁 Ulang dari awal
  </a>

</div>

<script>
// 🎬 ANIMASI MASUK
window.addEventListener("load", ()=>{
  document.body.classList.remove("opacity-0","scale-95");
});

// 🎵 MUSIC PERSIST
const music = document.getElementById("music");

if(music){
  const savedTime = localStorage.getItem("musicTime");
  if(savedTime){
    music.currentTime = savedTime;
  }

  setInterval(()=>{
    localStorage.setItem("musicTime", music.currentTime);
  },1000);
}

// 💖 LOVE JATUH
setInterval(()=>{
  const h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="fixed";
  h.style.top="0";
  h.style.left=Math.random()*100+"vw";
  h.style.animation="fall 3s linear";
  h.style.zIndex="999";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
},300);

// 🎉 CONFETTI
setTimeout(()=>{
  for(let i=0;i<60;i++){
    const c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="6px";
    c.style.height="6px";
    c.style.background=["pink","white","deeppink"][Math.floor(Math.random()*3)];
    c.style.left=Math.random()*100+"vw";
    c.style.top="0";
    c.style.animation="fall 3s linear";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
},500);
</script>

</body>
</html>
