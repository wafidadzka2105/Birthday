<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender 📅</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fall {
  to { transform: translateY(100vh); opacity:0;}
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall linear;
}

/* GLOW */
.glow {
  box-shadow: 0 0 20px #f472b6;
}
</style>

</head>

<body class="bg-gradient-to-b from-pink-100 to-pink-200 min-h-screen flex items-center justify-center">

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- CARD -->
<div class="bg-white/70 backdrop-blur-lg p-6 rounded-3xl shadow-xl text-center max-w-md w-full">

  <h1 class="text-2xl font-bold text-pink-500">3 Mei 2026 💖</h1>

  <!-- HARI -->
  <div class="grid grid-cols-7 gap-2 mt-4 text-xs font-semibold text-gray-500">
    <div>Min</div>
    <div>Sen</div>
    <div>Sel</div>
    <div>Rab</div>
    <div>Kam</div>
    <div>Jum</div>
    <div>Sab</div>
  </div>

  <!-- TANGGAL -->
  <div id="calendar" class="grid grid-cols-7 gap-2 mt-2"></div>

  <p class="mt-4 text-pink-500 font-semibold">
    🎉 Hari paling spesial 💖
  </p>

  <a href="Home.html" class="inline-block mt-4 text-pink-500 font-semibold hover:underline">
    ← Kembali
  </a>

</div>

<script src="script.js"></script>

<script>
// MUSIC
document.addEventListener("click", ()=>{
  const music = document.getElementById("music");
  if(music) music.play();
},{once:true});

// KALENDER
const cal = document.getElementById("calendar");
const startDay = 5; // Mei 2026 mulai Jumat

// kosong
for(let i=0;i<startDay;i++){
  cal.appendChild(document.createElement("div"));
}

// tanggal
for(let i=1;i<=31;i++){
  const el = document.createElement("div");

  if(i === 3){
    el.className = "bg-pink-500 text-white p-2 rounded-lg font-bold shadow glow cursor-pointer animate-pulse";
    el.innerHTML = "💖<br>3";

    el.onclick = ()=>{
      showLovePopup();
      confettiBurst();
    }

  } else {
    el.className = "bg-white p-2 rounded-lg shadow text-gray-700";
    el.innerText = i;
  }

  cal.appendChild(el);
}

// POPUP ROMANTIS
function showLovePopup(){
  alert("💖 Selamat ulang tahun Vivi 💖\nSemoga hari ini penuh kebahagiaan 🥰\nAku selalu ada untuk kamu 💕");
}

// CONFETTI BURST
function confettiBurst(){
  for(let i=0;i<50;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100+"vw";
    c.style.background = ["#ff69b4","#ffc0cb","#ff1493","#ffffff"][Math.floor(Math.random()*4)];
    c.style.animationDuration = (Math.random()*3+2)+"s";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

// LOVE JATUH
setInterval(()=>{
  const h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="fixed";
  h.style.top="0";
  h.style.left=Math.random()*100+"vw";
  h.style.animation="fall 3s linear";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
},300);

</script>

</body>
</html>
